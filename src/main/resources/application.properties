# ------------------------------------
# Spring Boot
# ------------------------------------
spring.application.name=NEPU_FAMS

# ------------------------------------
# Static Resources (only jar internal)
# ------------------------------------
spring.web.resources.static-locations=classpath:/static/

# ------------------------------------
# Server
# ------------------------------------
server.port=8088

# ------------------------------------
# DataSource (MySQL)
# ------------------------------------
spring.datasource.url=jdbc:mysql://localhost:3306/nepu_fams?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=${DB_PASSWORD:123456}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ------------------------------------
# SQL 初始化（数据已导入，设为 never）
# ------------------------------------
spring.sql.init.mode=never

# 禁用 Flyway（灵梭 Agent 引入了 Flyway 依赖，但项目不需要数据库迁移）
spring.flyway.enabled=false

# ------------------------------------
# MyBatis-Plus
# ------------------------------------
mybatis-plus.configuration.map-underscore-to-camel-case=true
mybatis-plus.global-config.db-config.id-type=auto
mybatis-plus.global-config.db-config.logic-delete-field=is_deleted
mybatis-plus.global-config.db-config.logic-delete-value=1
mybatis-plus.global-config.db-config.logic-not-delete-value=0
mybatis-plus.type-aliases-package=xyz.wolegelei.nepu_fams.entity

# ------------------------------------
# Sa-Token
# ------------------------------------
sa-token.token-name=Authorization
sa-token.timeout=2592000
sa-token.active-timeout=-1
sa-token.is-concurrent=true
sa-token.is-share=true
sa-token.token-style=uuid
sa-token.is-log=false

# ------------------------------------
# Mail
# ------------------------------------
# 部署到服务器时，建议通过环境变量配置，避免泄露敏感信息
spring.mail.host=${MAIL_HOST:smtp.qq.com}
spring.mail.port=${MAIL_PORT:465}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.protocol=${MAIL_PROTOCOL:smtps}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.ssl.enable=true

# ------------------------------------
# Optional LLM config for inventory diff analysis
# ------------------------------------
llm.api-url=
llm.api-key=
llm.model=gpt-4o-mini

# ------------------------------------
# Logging
# ------------------------------------
logging.level.root=info
logging.level.xyz.wolegelei.nepu_fams=info
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{50} - %msg%n

# 可选：配置 OpenAI 兼容接口后，盘点差异分析会调用大模型；未配置时使用规则分析兜底。
llm.api-url=${LLM_API_URL:}
llm.api-key=${LLM_API_KEY:}
llm.model=${LLM_MODEL:gpt-4o-mini}

# ------------------------------------
# Loom Agent (灵梭) AI 配置
# ------------------------------------
# 大模型配置 - 支持 OpenAI 兼容接口
spring.ai.openai.api-key=${AI_API_KEY:sk-dummy-key-for-startup}
spring.ai.openai.base-url=${AI_API_BASE_URL:https://api.openai.com/v1}
spring.ai.openai.chat.options.model=${AI_MODEL:gpt-5.5}

# 灵梭基础配置
spring.ai.loom.enabled=true
spring.ai.loom.chat.enabled=true
spring.ai.loom.rag.enabled=true
spring.ai.loom.tools.enabled=true
spring.ai.loom.agent.auth.enabled=true
spring.ai.loom.agent.user.username=nepu-admin
spring.ai.loom.agent.user.nickname=NEPU-FAMS 管理员
spring.ai.loom.agent.user.authentication=loom-agent-auth
spring.ai.loom.agent.auth.exclude-path-patterns[0]=/spring/ai/loom
spring.ai.loom.agent.auth.exclude-path-patterns[1]=/spring/ai/loom/
spring.ai.loom.agent.auth.exclude-path-patterns[2]=/spring/ai/loom/user/login
spring.ai.loom.agent.auth.exclude-path-patterns[3]=/spring/ai/loom/user/isAutoLogin
spring.ai.loom.agent.auth.exclude-path-patterns[4]=/spring/ai/loom/user/logout
spring.ai.loom.agent.auth.exclude-path-patterns[5]=/spring/ai/loom/index.html
spring.ai.loom.agent.auth.exclude-path-patterns[6]=/spring/ai/loom/app.js
spring.ai.loom.agent.auth.exclude-path-patterns[7]=/spring/ai/loom/style.css

# 知识库存储配置（默认 JVector，零外部依赖）
spring.ai.loom.rag.store=jvector
spring.ai.loom.rag.collection=nepu-fams-knowledge

# 安全配置：默认启用文件工具，可根据需要禁用
spring.ai.loom.tools.file.enabled=true
spring.ai.loom.tools.file.read-only=true
