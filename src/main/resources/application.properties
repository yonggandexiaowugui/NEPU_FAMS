# ====================================
# Spring Boot
# ====================================
spring.application.name=NEPU_FAMS

# ------------------------------------
# Server
# ------------------------------------
server.port=8088

# ------------------------------------
# DataSource (MySQL)
# ------------------------------------
spring.datasource.url=jdbc:mysql://localhost:3306/nepu_fams?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=${DB_PASSWORD:123456}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ------------------------------------
# SQL 初始化（数据已导入，设为 never）
# ------------------------------------
spring.sql.init.mode=never

# ------------------------------------
# MyBatis-Plus
# ------------------------------------
mybatis-plus.configuration.map-underscore-to-camel-case=true
mybatis-plus.global-config.db-config.id-type=auto
mybatis-plus.global-config.db-config.logic-delete-field=is_deleted
mybatis-plus.global-config.db-config.logic-delete-value=1
mybatis-plus.global-config.db-config.logic-not-delete-value=0
mybatis-plus.type-aliases-package=xyz.wolegelei.nepu_fams.entity

# ------------------------------------
# Sa-Token
# ------------------------------------
sa-token.token-name=Authorization
sa-token.timeout=2592000
sa-token.active-timeout=-1
sa-token.is-concurrent=true
sa-token.is-share=true
sa-token.token-style=uuid
sa-token.is-log=false

# ------------------------------------
# Logging
# ------------------------------------
logging.level.root=info
logging.level.xyz.wolegelei.nepu_fams=info
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{50} - %msg%n
