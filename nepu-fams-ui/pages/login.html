/* NEPU-FAMS Design System - Cyberpunk Sci-Fi Admin Console */
/* Brand CSS Variables */

:root {
  /* === Core Background System === */
  --color-bg-primary: #080C16;
  --color-bg-secondary: #0D1321;
  --color-bg-tertiary: #111827;
  --color-bg-card: rgba(13, 19, 33, 0.7);
  --color-bg-card-hover: rgba(17, 24, 39, 0.85);
  --color-bg-glass: rgba(13, 19, 33, 0.6);
  --color-bg-overlay: rgba(8, 12, 22, 0.85);
  --color-bg-input: rgba(13, 19, 33, 0.8);

  /* === Primary Brand - Electric Petroleum Blue === */
  --color-primary: #00E5FF;
  --color-primary-rgb: 0, 229, 255;
  --color-primary-dim: rgba(0, 229, 255, 0.6);
  --color-primary-faint: rgba(0, 229, 255, 0.15);
  --color-primary-glow: rgba(0, 229, 255, 0.4);
  --color-primary-dark: #00B8CC;
  --color-primary-light: #33EBFF;

  /* === Secondary Brand - Neon Industrial Gold === */
  --color-secondary: #FFB800;
  --color-secondary-rgb: 255, 184, 0;
  --color-secondary-dim: rgba(255, 184, 0, 0.6);
  --color-secondary-faint: rgba(255, 184, 0, 0.15);
  --color-secondary-glow: rgba(255, 184, 0, 0.4);

  /* === Functional Colors === */
  --color-success: #00FF94;
  --color-success-rgb: 0, 255, 148;
  --color-success-dim: rgba(0, 255, 148, 0.6);
  --color-success-faint: rgba(0, 255, 148, 0.15);
  --color-success-glow: rgba(0, 255, 148, 0.4);

  --color-warning: #FF8A00;
  --color-warning-rgb: 255, 138, 0;
  --color-warning-dim: rgba(255, 138, 0, 0.6);
  --color-warning-faint: rgba(255, 138, 0, 0.15);
  --color-warning-glow: rgba(255, 138, 0, 0.4);

  --color-danger: #FF2E63;
  --color-danger-rgb: 255, 46, 99;
  --color-danger-dim: rgba(255, 46, 99, 0.6);
  --color-danger-faint: rgba(255, 46, 99, 0.15);
  --color-danger-glow: rgba(255, 46, 99, 0.4);

  --color-info: #00E5FF;

  /* === Text Colors === */
  --color-text-primary: #E8ECF4;
  --color-text-secondary: rgba(232, 236, 244, 0.7);
  --color-text-tertiary: rgba(232, 236, 244, 0.45);
  --color-text-disabled: rgba(232, 236, 244, 0.25);
  --color-text-inverse: #080C16;
  --color-text-link: #00E5FF;
  --color-text-glow: rgba(232, 236, 244, 0.9);

  /* === Border Colors === */
  --color-border-primary: rgba(0, 229, 255, 0.2);
  --color-border-hover: rgba(0, 229, 255, 0.4);
  --color-border-focus: rgba(0, 229, 255, 0.6);
  --color-border-subtle: rgba(232, 236, 244, 0.08);
  --color-border-glass: rgba(0, 229, 255, 0.12);

  /* === Glow / Neon Effects === */
  --glow-primary: 0 0 10px rgba(0, 229, 255, 0.5), 0 0 20px rgba(0, 229, 255, 0.2);
  --glow-secondary: 0 0 10px rgba(255, 184, 0, 0.5), 0 0 20px rgba(255, 184, 0, 0.2);
  --glow-success: 0 0 10px rgba(0, 255, 148, 0.5), 0 0 20px rgba(0, 255, 148, 0.2);
  --glow-danger: 0 0 10px rgba(255, 46, 99, 0.5), 0 0 20px rgba(255, 46, 99, 0.2);
  --glow-warning: 0 0 10px rgba(255, 138, 0, 0.5), 0 0 20px rgba(255, 138, 0, 0.2);

  /* === Glass Effect === */
  --glass-blur: blur(16px);
  --glass-blur-heavy: blur(24px);
  --glass-bg: rgba(13, 19, 33, 0.65);
  --glass-border: 1px solid rgba(0, 229, 255, 0.12);
  --glass-shadow: 0 8px 32px rgba(0, 0, 0, 0.4), inset 0 1px 0 rgba(0, 229, 255, 0.06);

  /* === Radius System === */
  --radius-sm: 4px;
  --radius-md: 8px;
  --radius-lg: 12px;
  --radius-xl: 16px;
  --radius-full: 9999px;

  /* === Spacing === */
  --space-xs: 4px;
  --space-sm: 8px;
  --space-md: 16px;
  --space-lg: 24px;
  --space-xl: 32px;
  --space-2xl: 48px;
  --space-3xl: 64px;

  /* === Typography === */
  --font-family-display: 'Orbitron', 'Rajdhani', 'Microsoft YaHei', sans-serif;
  --font-family-body: 'Inter', 'Microsoft YaHei', 'PingFang SC', sans-serif;
  --font-family-mono: 'JetBrains Mono', 'Fira Code', 'Consolas', monospace;

  --font-size-xs: 11px;
  --font-size-sm: 12px;
  --font-size-base: 13px;
  --font-size-md: 14px;
  --font-size-lg: 16px;
  --font-size-xl: 20px;
  --font-size-2xl: 24px;
  --font-size-3xl: 32px;
  --font-size-4xl: 40px;
  --font-size-5xl: 48px;

  --font-weight-normal: 400;
  --font-weight-medium: 500;
  --font-weight-semibold: 600;
  --font-weight-bold: 700;

  --line-height-tight: 1.25;
  --line-height-normal: 1.5;
  --line-height-relaxed: 1.75;

  --letter-spacing-tight: -0.02em;
  --letter-spacing-normal: 0;
  --letter-spacing-wide: 0.05em;
  --letter-spacing-wider: 0.1em;

  /* === Shadow System === */
  --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.3);
  --shadow-md: 0 4px 16px rgba(0, 0, 0, 0.35);
  --shadow-lg: 0 8px 32px rgba(0, 0, 0, 0.4);
  --shadow-xl: 0 16px 48px rgba(0, 0, 0, 0.5);
  --shadow-card: 0 8px 32px rgba(0, 0, 0, 0.4), inset 0 1px 0 rgba(0, 229, 255, 0.06);
  --shadow-float: 0 16px 48px rgba(0, 0, 0, 0.6), 0 0 30px rgba(0, 229, 255, 0.1);

  /* === Sidebar === */
  --sidebar-width: 240px;
  --sidebar-collapsed-width: 64px;
  --sidebar-bg: rgba(8, 12, 22, 0.95);

  /* === Header === */
  --header-height: 56px;
  --header-bg: rgba(8, 12, 22, 0.8);

  /* === Transitions === */
  --transition-fast: 150ms ease;
  --transition-normal: 250ms ease;
  --transition-slow: 400ms ease;
  --transition-bounce: 300ms cubic-bezier(0.34, 1.56, 0.64, 1);

  /* === Z-Index Scale === */
  --z-sidebar: 100;
  --z-header: 200;
  --z-dropdown: 300;
  --z-modal-backdrop: 400;
  --z-modal: 500;
  --z-toast: 600;
  --z-tooltip: 700;
}

/* === Global Base Styles === */
html {
  font-size: var(--font-size-base);
  line-height: var(--line-height-normal);
  color: var(--color-text-primary);
  background-color: var(--color-bg-primary);
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

body {
  font-family: var(--font-family-body);
  background: var(--color-bg-primary);
  min-height: 100vh;
  overflow-x: hidden;
}

/* === Utility Classes === */
.text-glow {
  text-shadow: 0 0 8px rgba(0, 229, 255, 0.6), 0 0 16px rgba(0, 229, 255, 0.3);
}

.text-glow-gold {
  text-shadow: 0 0 8px rgba(255, 184, 0, 0.6), 0 0 16px rgba(255, 184, 0, 0.3);
}

.glass-card {
  background: var(--glass-bg);
  backdrop-filter: var(--glass-blur);
  -webkit-backdrop-filter: var(--glass-blur);
  border: var(--glass-border);
  border-radius: var(--radius-lg);
  box-shadow: var(--shadow-card);
}

.glass-card-hover:hover {
  background: var(--color-bg-card-hover);
  border-color: var(--color-border-hover);
  box-shadow: var(--shadow-card), var(--glow-primary);
  transform: translateY(-2px) scale(1.02);
  transition: all var(--transition-normal);
}

.neon-border {
  border: 1px solid var(--color-border-primary);
  box-shadow: var(--glow-primary);
}

.neon-border-gold {
  border: 1px solid rgba(255, 184, 0, 0.3);
  box-shadow: var(--glow-secondary);
}

.neon-text {
  color: var(--color-primary);
  text-shadow: 0 0 8px rgba(0, 229, 255, 0.5);
}

.neon-btn {
  background: linear-gradient(135deg, rgba(0, 229, 255, 0.2), rgba(0, 229, 255, 0.1));
  border: 1px solid var(--color-primary);
  color: var(--color-primary);
  padding: 8px 20px;
  border-radius: var(--radius-md);
  font-weight: var(--font-weight-medium);
  cursor: pointer;
  transition: all var(--transition-normal);
  box-shadow: var(--glow-primary);
  text-shadow: 0 0 8px rgba(0, 229, 255, 0.5);
}

.neon-btn:hover {
  background: linear-gradient(135deg, rgba(0, 229, 255, 0.3), rgba(0, 229, 255, 0.2));
  box-shadow: 0 0 15px rgba(0, 229, 255, 0.6), 0 0 30px rgba(0, 229, 255, 0.3);
  transform: translateY(-2px);
}

.neon-btn-gold {
  background: linear-gradient(135deg, rgba(255, 184, 0, 0.2), rgba(255, 184, 0, 0.1));
  border: 1px solid var(--color-secondary);
  color: var(--color-secondary);
  box-shadow: var(--glow-secondary);
  text-shadow: 0 0 8px rgba(255, 184, 0, 0.5);
}

.neon-btn-gold:hover {
  background: linear-gradient(135deg, rgba(255, 184, 0, 0.3), rgba(255, 184, 0, 0.2));
  box-shadow: 0 0 15px rgba(255, 184, 0, 0.6), 0 0 30px rgba(255, 184, 0, 0.3);
}

.neon-btn-danger {
  background: linear-gradient(135deg, rgba(255, 46, 99, 0.2), rgba(255, 46, 99, 0.1));
  border: 1px solid var(--color-danger);
  color: var(--color-danger);
  box-shadow: var(--glow-danger);
}

/* === Neon Status Badges === */
.status-idle {
  background: var(--color-success-faint);
  border: 1px solid rgba(0, 255, 148, 0.3);
  color: var(--color-success);
  text-shadow: 0 0 6px rgba(0, 255, 148, 0.4);
}

.status-in-use {
  background: var(--color-warning-faint);
  border: 1px solid rgba(255, 138, 0, 0.3);
  color: var(--color-warning);
  text-shadow: 0 0 6px rgba(255, 138, 0, 0.4);
}

.status-repair {
  background: rgba(255, 184, 0, 0.15);
  border: 1px solid rgba(255, 184, 0, 0.3);
  color: var(--color-secondary);
  text-shadow: 0 0 6px rgba(255, 184, 0, 0.4);
}

.status-scrapped {
  background: var(--color-danger-faint);
  border: 1px solid rgba(255, 46, 99, 0.3);
  color: var(--color-danger);
  text-shadow: 0 0 6px rgba(255, 46, 99, 0.4);
}

.status-loss {
  background: rgba(232, 236, 244, 0.08);
  border: 1px solid rgba(232, 236, 244, 0.15);
  color: var(--color-text-tertiary);
}

/* === Table Styles === */
.cyber-table {
  width: 100%;
  border-collapse: separate;
  border-spacing: 0;
}

.cyber-table thead th {
  background: rgba(0, 229, 255, 0.08);
  border-bottom: 1px solid var(--color-border-primary);
  color: var(--color-primary);
  font-weight: var(--font-weight-semibold);
  font-size: var(--font-size-sm);
  text-transform: uppercase;
  letter-spacing: var(--letter-spacing-wider);
  padding: 12px 16px;
  text-align: left;
}

.cyber-table tbody tr {
  border-bottom: 1px solid var(--color-border-subtle);
  transition: all var(--transition-fast);
}

.cyber-table tbody tr:hover {
  background: rgba(0, 229, 255, 0.05);
  box-shadow: inset 0 0 20px rgba(0, 229, 255, 0.03);
}

.cyber-table tbody td {
  padding: 12px 16px;
  font-size: var(--font-size-base);
  color: var(--color-text-secondary);
}

/* === Scrollbar === */
::-webkit-scrollbar {
  width: 6px;
  height: 6px;
}

::-webkit-scrollbar-track {
  background: var(--color-bg-primary);
}

::-webkit-scrollbar-thumb {
  background: rgba(0, 229, 255, 0.2);
  border-radius: 3px;
}

::-webkit-scrollbar-thumb:hover {
  background: rgba(0, 229, 255, 0.4);
}

/* === Animations === */
@keyframes pulse-glow {
  0%, 100% { box-shadow: 0 0 8px rgba(0, 229, 255, 0.4); }
  50% { box-shadow: 0 0 20px rgba(0, 229, 255, 0.8), 0 0 40px rgba(0, 229, 255, 0.3); }
}

@keyframes breathe {
  0%, 100% { opacity: 0.6; }
  50% { opacity: 1; }
}

@keyframes float-up {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}

@keyframes scan-line {
  0% { top: 0; }
  100% { top: 100%; }
}

@keyframes liquid-wave {
  0% { border-radius: 40% 60% 60% 40% / 60% 30% 70% 40%; }
  50% { border-radius: 60% 40% 30% 70% / 30% 60% 40% 60%; }
  100% { border-radius: 40% 60% 60% 40% / 60% 30% 70% 40%; }
}

@keyframes neon-flow {
  0% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}

@keyframes counter-scroll {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}

@keyframes ripple {
  0% { transform: scale(0); opacity: 0.6; }
  100% { transform: scale(4); opacity: 0; }
}

.animate-float-up {
  animation: float-up 0.6s ease-out forwards;
}

.animate-pulse-glow {
  animation: pulse-glow 2s ease-in-out infinite;
}

.animate-breathe {
  animation: breathe 3s ease-in-out infinite;
}

/* === Input Focus === */
.cyber-input {
  background: var(--color-bg-input);
  border: 1px solid var(--color-border-subtle);
  border-radius: var(--radius-md);
  color: var(--color-text-primary);
  padding: 8px 14px;
  font-size: var(--font-size-base);
  transition: all var(--transition-normal);
  outline: none;
}

.cyber-input:focus {
  border-color: var(--color-primary);
  box-shadow: 0 0 10px rgba(0, 229, 255, 0.3), 0 0 20px rgba(0, 229, 255, 0.1);
}

.cyber-input::placeholder {
  color: var(--color-text-tertiary);
}

                <!-- 底部信息 -->
                <div class="login-footer">
                    <div class="footer-line"></div>
                    <p class="footer-text">计算机科学与技术学院 · 企业项目综合实训</p>
                </div>
            </div>
        </div>

        <!-- ===== 背景网格 ===== -->
        <div class="grid-bg" aria-hidden="true"></div>

        <!-- ===== 角落装饰 ===== -->
        <div class="corner-deco corner-tl" aria-hidden="true"></div>
        <div class="corner-deco corner-tr" aria-hidden="true"></div>
        <div class="corner-deco corner-bl" aria-hidden="true"></div>
        <div class="corner-deco corner-br" aria-hidden="true"></div>
    </div>

    <!-- ===== 登录页面专用样式 ===== -->
    <style>
        /* === Page Reset === */
        .login-page {
            position: relative;
            width: 100vw;
            height: 100vh;
            min-width: 1920px;
            min-height: 1080px;
            overflow: hidden;
            background: var(--color-bg-primary);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* === Background Grid === */
        .grid-bg {
            position: absolute;
            inset: 0;
            background-image:
                linear-gradient(rgba(0, 229, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 229, 255, 0.03) 1px, transparent 1px);
            background-size: 60px 60px;
            z-index: 0;
        }

        /* === Particle Field === */
        .particles {
            position: absolute;
            inset: 0;
            z-index: 1;
            overflow: hidden;
        }

        .particles span {
            position: absolute;
            left: var(--x);
            top: var(--y);
            width: var(--size);
            height: var(--size);
            background: var(--color-primary);
            border-radius: 50%;
            opacity: var(--opacity);
            box-shadow: 0 0 6px var(--color-primary-glow);
            animation: particle-float var(--duration) linear var(--delay) infinite;
        }

        @keyframes particle-float {
            0% {
                transform: translate(0, 0) scale(1);
                opacity: 0;
            }
            10% {
                opacity: var(--opacity);
            }
            50% {
                transform: translate(80px, -120px) scale(1.3);
            }
            90% {
                opacity: var(--opacity);
            }
            100% {
                transform: translate(160px, -240px) scale(0.5);
                opacity: 0;
            }
        }

        /* === Hologram Area (Center-Left) === */
        .hologram-area {
            position: absolute;
            left: 12%;
            top: 50%;
            transform: translateY(-50%);
            width: 280px;
            height: 280px;
            z-index: 2;
        }

        /* === Glowing Ring === */
        .hologram-ring {
            position: absolute;
            inset: -20px;
            border-radius: 50%;
            border: 2px solid rgba(0, 229, 255, 0.3);
            box-shadow:
                0 0 15px rgba(0, 229, 255, 0.2),
                0 0 30px rgba(0, 229, 255, 0.1),
                inset 0 0 15px rgba(0, 229, 255, 0.1);
            animation: ring-rotate 12s linear infinite;
        }

        @keyframes ring-rotate {
            0% { transform: rotateY(0deg); }
            100% { transform: rotateY(360deg); }
        }

        /* Orbit Data Stream Lines */
        .orbit-line {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 140px;
            height: 2px;
            transform-origin: 0 50%;
            overflow: hidden;
        }

        .orbit-line::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 40px;
            height: 100%;
            background: linear-gradient(90deg, transparent, var(--color-primary), transparent);
            animation: orbit-flow 3s linear infinite;
        }

        .orbit-line-1 {
            transform: rotate(0deg);
        }
        .orbit-line-1::after {
            animation-duration: 3s;
        }

        .orbit-line-2 {
            transform: rotate(120deg);
        }
        .orbit-line-2::after {
            animation-duration: 4s;
            animation-delay: -1.5s;
        }

        .orbit-line-3 {
            transform: rotate(240deg);
        }
        .orbit-line-3::after {
            animation-duration: 3.5s;
            animation-delay: -0.8s;
        }

        @keyframes orbit-flow {
            0% { left: -40px; }
            100% { left: 200px; }
        }

        /* === Hologram Emblem (Shield / CSS Art) === */
        .hologram-emblem {
            position: absolute;
            inset: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            animation: emblem-float 6s ease-in-out infinite;
        }

        @keyframes emblem-float {
            0%, 100% { transform: translateY(0) rotateY(0deg); }
            25% { transform: translateY(-8px) rotateY(15deg); }
            50% { transform: translateY(0) rotateY(0deg); }
            75% { transform: translateY(8px) rotateY(-15deg); }
        }

        .shield {
            position: relative;
            width: 120px;
            height: 140px;
            animation: shield-rotate 20s linear infinite;
            filter: drop-shadow(0 0 20px rgba(0, 229, 255, 0.6)) drop-shadow(0 0 40px rgba(0, 229, 255, 0.3));
        }

        @keyframes shield-rotate {
            0% { transform: rotateY(0deg); }
            100% { transform: rotateY(360deg); }
        }

        .shield-border {
            position: absolute;
            inset: 0;
            clip-path: polygon(50% 0%, 100% 15%, 100% 75%, 50% 100%, 0% 75%, 0% 15%);
            background: linear-gradient(180deg, rgba(0, 229, 255, 0.5), rgba(0, 229, 255, 0.1));
        }

        .shield-inner {
            position: absolute;
            inset: 4px;
            clip-path: polygon(50% 0%, 100% 15%, 100% 75%, 50% 100%, 0% 75%, 0% 15%);
            background: linear-gradient(180deg,
                rgba(0, 229, 255, 0.15),
                rgba(0, 229, 255, 0.05));
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .shield-top {
            position: absolute;
            top: 12px;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 0;
            border-left: 20px solid transparent;
            border-right: 20px solid transparent;
            border-bottom: 18px solid rgba(0, 229, 255, 0.5);
            filter: drop-shadow(0 0 4px rgba(0, 229, 255, 0.8));
        }

        .shield-cross-h {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 50px;
            height: 3px;
            background: rgba(0, 229, 255, 0.6);
            box-shadow: 0 0 8px rgba(0, 229, 255, 0.5);
        }

        .shield-cross-v {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 3px;
            height: 50px;
            background: rgba(0, 229, 255, 0.6);
            box-shadow: 0 0 8px rgba(0, 229, 255, 0.5);
        }

        .shield-diamond {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) rotate(45deg);
            width: 22px;
            height: 22px;
            border: 2px solid rgba(0, 229, 255, 0.7);
            box-shadow: 0 0 10px rgba(0, 229, 255, 0.4);
        }

        .hologram-label {
            position: absolute;
            bottom: -40px;
            left: 50%;
            transform: translateX(-50%);
            font-family: var(--font-family-display);
            font-size: 16px;
            font-weight: 700;
            letter-spacing: 0.3em;
            color: var(--color-primary);
            text-shadow:
                0 0 10px rgba(0, 229, 255, 0.6),
                0 0 20px rgba(0, 229, 255, 0.3);
            animation: label-flicker 4s ease-in-out infinite;
        }

        @keyframes label-flicker {
            0%, 100% { opacity: 0.8; }
            5% { opacity: 1; }
            10% { opacity: 0.6; }
            15% { opacity: 1; }
            50% { opacity: 0.9; }
            80% { opacity: 1; }
            85% { opacity: 0.5; }
            90% { opacity: 1; }
        }

        /* === Tower Silhouettes (Bottom Corners) === */
        .tower-silhouette {
            position: absolute;
            bottom: 0;
            width: 120px;
            height: 200px;
            opacity: 0.12;
            z-index: 1;
            pointer-events: none;
        }

        .tower-silhouette::before {
            content: '';
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 40px;
            height: 180px;
            background: linear-gradient(to top, var(--color-primary), transparent);
            clip-path: polygon(30% 0%, 70% 0%, 70% 85%, 80% 85%, 65% 100%, 35% 100%, 20% 85%, 30% 85%);
            filter: blur(2px);
        }

        .tower-silhouette::after {
            content: '';
            position: absolute;
            top: 10px;
            left: 50%;
            transform: translateX(-50%);
            width: 60px;
            height: 40px;
            background: var(--color-primary);
            clip-path: polygon(50% 0%, 0% 100%, 100% 100%);
            opacity: 0.6;
        }

        .tower-left {
            left: 3%;
        }

        .tower-right {
            right: 3%;
        }

        /* === Login Card Wrapper (Float Animation) === */
        .login-card-wrapper {
            position: relative;
            z-index: 10;
            animation: card-float 5s ease-in-out infinite;
        }

        @keyframes card-float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }

        /* === Login Card (Glassmorphism) === */
        .login-card {
            position: relative;
            width: 440px;
            padding: 48px 40px 36px;
            background: rgba(8, 12, 22, 0.75);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-radius: 16px;
            border: 1px solid rgba(0, 229, 255, 0.25);
            box-shadow:
                0 0 30px rgba(0, 229, 255, 0.15),
                0 0 60px rgba(0, 229, 255, 0.05),
                0 20px 60px rgba(0, 0, 0, 0.5),
                inset 0 1px 0 rgba(0, 229, 255, 0.1),
                inset 0 0 40px rgba(0, 229, 255, 0.03);
            overflow: hidden;
        }

        /* Card Scanline */
        .card-scanline {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 2px;
            background: linear-gradient(90deg,
                transparent,
                rgba(0, 229, 255, 0.4),
                transparent);
            animation: scanline 4s linear infinite;
            z-index: 20;
        }

        @keyframes scanline {
            0% { top: 0; opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { top: 100%; opacity: 0; }
        }

        /* === Login Header === */
        .login-header {
            text-align: center;
            margin-bottom: 36px;
        }

        .login-title {
            font-family: var(--font-family-display);
            font-size: 36px;
            font-weight: 800;
            letter-spacing: 0.12em;
            color: var(--color-primary);
            text-shadow:
                0 0 10px rgba(0, 229, 255, 0.6),
                0 0 20px rgba(0, 229, 255, 0.3),
                0 0 40px rgba(0, 229, 255, 0.15);
            margin: 0 0 10px 0;
            line-height: 1.2;
        }

        .login-subtitle {
            font-family: var(--font-family-body);
            font-size: 14px;
            font-weight: 400;
            color: var(--color-text-secondary);
            letter-spacing: 0.15em;
            text-shadow: 0 0 8px rgba(0, 229, 255, 0.2);
            margin: 0;
        }

        .header-line {
            margin: 20px auto 0;
            width: 120px;
            height: 1px;
            background: linear-gradient(90deg,
                transparent,
                rgba(0, 229, 255, 0.4),
                rgba(255, 184, 0, 0.3),
                rgba(0, 229, 255, 0.4),
                transparent);
        }

        /* === Login Form === */
        .login-form {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .input-label {
            font-family: var(--font-family-body);
            font-size: 12px;
            font-weight: 500;
            color: var(--color-text-secondary);
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }

        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .input-icon {
            position: absolute;
            left: 14px;
            color: var(--color-text-tertiary);
            transition: color var(--transition-normal), text-shadow var(--transition-normal);
            z-index: 2;
            pointer-events: none;
        }

        .input-wrapper:focus-within .input-icon {
            color: var(--color-primary);
            filter: drop-shadow(0 0 4px rgba(0, 229, 255, 0.5));
        }

        .login-input {
            width: 100%;
            padding: 14px 16px 14px 44px;
            background: rgba(13, 19, 33, 0.9);
            border: 1px solid rgba(232, 236, 244, 0.08);
            border-radius: 8px;
            color: var(--color-text-primary);
            font-family: var(--font-family-body);
            font-size: 14px;
            outline: none;
            transition: all var(--transition-normal);
            box-sizing: border-box;
        }

        .login-input::placeholder {
            color: var(--color-text-tertiary);
            font-size: 13px;
        }

        .login-input:focus {
            border-color: var(--color-primary);
            box-shadow:
                0 0 8px rgba(0, 229, 255, 0.3),
                0 0 20px rgba(0, 229, 255, 0.15),
                0 0 40px rgba(0, 229, 255, 0.05);
            background: rgba(13, 19, 33, 1);
        }

        /* Electric glow trailing light on focus */
        .input-focus-line {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 0;
            height: 2px;
            background: linear-gradient(90deg,
                transparent,
                var(--color-primary),
                var(--color-primary),
                transparent);
            transition: width 0.6s cubic-bezier(0.23, 1, 0.32, 1);
            box-shadow: 0 0 10px rgba(0, 229, 255, 0.6);
        }

        .input-wrapper:focus-within .input-focus-line {
            width: 100%;
        }

        /* === Form Options === */
        .form-options {
            display: flex;
            align-items: center;
            margin-top: -4px;
        }

        .remember-me {
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            user-select: none;
        }

        .neon-checkbox {
            display: none;
        }

        .checkbox-custom {
            position: relative;
            width: 18px;
            height: 18px;
            border: 1px solid rgba(0, 229, 255, 0.3);
            border-radius: 4px;
            background: rgba(13, 19, 33, 0.8);
            transition: all var(--transition-normal);
            flex-shrink: 0;
        }

        .checkbox-custom::after {
            content: '';
            position: absolute;
            top: 2px;
            left: 6px;
            width: 4px;
            height: 8px;
            border: solid var(--color-primary);
            border-width: 0 2px 2px 0;
            transform: rotate(45deg) scale(0);
            transition: transform var(--transition-fast);
        }

        .neon-checkbox:checked + .checkbox-custom {
            border-color: var(--color-primary);
            background: rgba(0, 229, 255, 0.1);
            box-shadow: 0 0 8px rgba(0, 229, 255, 0.3);
        }

        .neon-checkbox:checked + .checkbox-custom::after {
            transform: rotate(45deg) scale(1);
        }

        .checkbox-label {
            font-size: 13px;
            color: var(--color-text-secondary);
            transition: color var(--transition-fast);
        }

        .remember-me:hover .checkbox-label {
            color: var(--color-text-primary);
        }

        .remember-me:hover .checkbox-custom {
            border-color: rgba(0, 229, 255, 0.5);
            box-shadow: 0 0 6px rgba(0, 229, 255, 0.2);
        }

        /* === Login Button === */
        .login-btn {
            position: relative;
            width: 100%;
            padding: 16px 24px;
            margin-top: 8px;
            background: linear-gradient(135deg,
                rgba(0, 229, 255, 0.2),
                rgba(100, 60, 255, 0.2),
                rgba(0, 229, 255, 0.15));
            border: 1px solid rgba(0, 229, 255, 0.5);
            border-radius: 8px;
            color: var(--color-primary);
            font-family: var(--font-family-display);
            font-size: 16px;
            font-weight: 700;
            letter-spacing: 0.3em;
            cursor: pointer;
            overflow: hidden;
            transition: all var(--transition-normal);
            animation: btn-breathe 3s ease-in-out infinite;
        }

        .login-btn:hover {
            background: linear-gradient(135deg,
                rgba(0, 229, 255, 0.35),
                rgba(100, 60, 255, 0.35),
                rgba(0, 229, 255, 0.25));
            box-shadow:
                0 0 20px rgba(0, 229, 255, 0.4),
                0 0 40px rgba(0, 229, 255, 0.15),
                0 0 60px rgba(100, 60, 255, 0.1);
            transform: scale(1.02);
        }

        .login-btn:active {
            transform: scale(0.98);
        }

        @keyframes btn-breathe {
            0%, 100% {
                box-shadow:
                    0 0 10px rgba(0, 229, 255, 0.2),
                    0 0 20px rgba(0, 229, 255, 0.1);
            }
            50% {
                box-shadow:
                    0 0 15px rgba(0, 229, 255, 0.4),
                    0 0 30px rgba(0, 229, 255, 0.2),
                    0 0 50px rgba(100, 60, 255, 0.1);
            }
        }

        /* Ripple Effect */
        .btn-ripple {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 40px;
            height: 40px;
            margin-top: -20px;
            margin-left: -20px;
            border-radius: 50%;
            background: rgba(0, 229, 255, 0.4);
            transform: scale(0);
            opacity: 0;
            pointer-events: none;
        }

        .login-btn:active .btn-ripple {
            animation: ripple-wave 0.8s ease-out;
        }

        .btn-ripple-2 {
            animation-delay: 0.15s;
        }

        @keyframes ripple-wave {
            0% {
                transform: scale(0);
                opacity: 0.6;
            }
            100% {
                transform: scale(12);
                opacity: 0;
            }
        }

        .btn-text {
            position: relative;
            z-index: 2;
            text-shadow:
                0 0 10px rgba(0, 229, 255, 0.6),
                0 0 20px rgba(0, 229, 255, 0.3);
        }

        /* === Login Footer === */
        .login-footer {
            text-align: center;
            margin-top: 28px;
        }

        .footer-line {
            width: 200px;
            height: 1px;
            margin: 0 auto 14px;
            background: linear-gradient(90deg,
                transparent,
                rgba(255, 184, 0, 0.2),
                rgba(0, 229, 255, 0.2),
                transparent);
        }

        .footer-text {
            font-family: var(--font-family-body);
            font-size: 11px;
            font-weight: 400;
            color: var(--color-text-tertiary);
            letter-spacing: 0.12em;
            text-shadow: 0 0 6px rgba(0, 229, 255, 0.15);
        }

        /* === Corner Decorations === */
        .corner-deco {
            position: absolute;
            width: 40px;
            height: 40px;
            z-index: 3;
            pointer-events: none;
        }

        .corner-tl {
            top: 30px;
            left: 30px;
            border-top: 2px solid rgba(0, 229, 255, 0.25);
            border-left: 2px solid rgba(0, 229, 255, 0.25);
        }

        .corner-tr {
            top: 30px;
            right: 30px;
            border-top: 2px solid rgba(0, 229, 255, 0.25);
            border-right: 2px solid rgba(0, 229, 255, 0.25);
        }

        .corner-bl {
            bottom: 30px;
            left: 30px;
            border-bottom: 2px solid rgba(255, 184, 0, 0.15);
            border-left: 2px solid rgba(255, 184, 0, 0.15);
        }

        .corner-br {
            bottom: 30px;
            right: 30px;
            border-bottom: 2px solid rgba(255, 184, 0, 0.15);
            border-right: 2px solid rgba(255, 184, 0, 0.15);
        }

        /* === Additional Ambient Effects === */
        .login-card::before {
            content: '';
            position: absolute;
            top: -1px;
            left: 20%;
            right: 20%;
            height: 1px;
            background: linear-gradient(90deg,
                transparent,
                rgba(0, 229, 255, 0.6),
                transparent);
            animation: top-glow 3s ease-in-out infinite;
        }

        .login-card::after {
            content: '';
            position: absolute;
            bottom: -1px;
            left: 30%;
            right: 30%;
            height: 1px;
            background: linear-gradient(90deg,
                transparent,
                rgba(255, 184, 0, 0.3),
                transparent);
            animation: bottom-glow 4s ease-in-out infinite;
        }

        @keyframes top-glow {
            0%, 100% { opacity: 0.4; }
            50% { opacity: 1; }
        }

        @keyframes bottom-glow {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 0.8; }
        }

        /* Hologram ambient glow on the ground */
        .hologram-area::after {
            content: '';
            position: absolute;
            bottom: -80px;
            left: 50%;
            transform: translateX(-50%);
            width: 200px;
            height: 4px;
            background: radial-gradient(ellipse, rgba(0, 229, 255, 0.3), transparent);
            animation: ground-glow 4s ease-in-out infinite;
        }

        @keyframes ground-glow {
            0%, 100% { opacity: 0.5; transform: translateX(-50%) scaleX(1); }
            50% { opacity: 1; transform: translateX(-50%) scaleX(1.2); }
        }
    </style>
